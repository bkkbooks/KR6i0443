body:
  text: 失譯人今附東晉録往昔佛共阿難行遇值一池東西四十里南北四十里深四十里池中有蟲其形似科蚪形黑如墨佛語阿難識此池中蟲不答言不識佛語阿難此池中蟲者十方世界大衆僧食不淨食墮此臭穢糞屎池中常食不淨五百萬世中受此苦惱竟後五百世中復墮餓狗中常食不淨復墮猪中五百世常食不淨復墮蜣蜋中常食不淨亦五百世得出為人常生貧窮家衣不覆形食不充口常食糠飯恆飢不足佛語諸比丘有如是者受罪尤苦無量無邊誡語後世末法中諸比丘不可不慎一切衆僧有住止處作不淨食不足往食欲淨食者一切白衣食如法著衣持鉢稱四威儀如法往造乞是真比丘除其邪命如法活命佛不妄言福報如影響往昔比丘新得阿羅漢有結業身有便利患夜暗上廁見一比丘在廁邊呻吟阿羅漢語是比丘汝本好用意人云何墮餓鬼中呻吟如是餓鬼比丘答言我餓渴來久五百餘年不見漿水正欲趣廁用食不淨護廁鬼神鐵杖打我不得近廁憶念本曾作比丘知僧事時是用觸衆僧淨食以不淨食食衆僧故致此殃遇值阿羅漢善知識阿羅漢為比丘僧中燒香呪願即免餓鬼還復人道佛語諸比丘不可不慎一切不得觸衆僧淨食佛不虛言福報如影響十八地獄經中出罪福此餓鬼本從人道中來以不清淨手觸衆僧淨器以不淨手觸沙門淨食以不淨食著沙門淨食中以不淨食食衆僧故後五百世中墮餓鬼中常食不淨欲趣廁上食糞于時廁神手捉鐵杖打之令不得近此鬼食人膿血涕唾及蕩滌惡汁常伺捕婦女産血不淨以為飲食復經五百世墮猪狗蜣蜋之中常食臭糞不淨受斯苦劇纍世如此於百千劫無有出期難得解脫痛不可言以不淨手觸男根或觸女根觸沙門淨器觸沙門淨食以不淨食著沙門淨食中以不淨食食衆僧故致此殃一切人肉眼不知罪福自今以後欲得福祐佐衆僧作食以清淨手捉衆僧淨器淨手淘米及以淨米著衆僧淨食中者得福無量自今以後以此為常一切衆人普使聞知一切檀越施設法會供齊調度持齊者得食不持齊者不得食此飯一日持齊得六十萬世餘糧不持齊者六十萬世墮餓鬼中何以故此信施難銷故寧吞熱鐵丸不食此飯吞熱鐵丸須臾間耳食此信施久受大苦五百萬世中受餓鬼苦諸有設食之處一切如法作齊不得懷挾餘殘食歸給妻子若食此飯若腋底挾擔後五百世常挾熱鐵輪左腋底入從右腋底出一切齊飯不可不慎一米化作熱丸一切賢者施設福會於先嘗啜此食都作殘食唐作此會不如不作何以故諸天不歡鬼神不喜此人於先嘗者亦五百世中受餓鬼苦自今已後欲得福者如法作齊食可得福德諸天歡喜百神慶悅天神擁護經不虛言福報如影響
