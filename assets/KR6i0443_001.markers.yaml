  - {type: punctuation, offset: 697, content: 。, id: KR6i0443_T_001-bkkpn139}
  - {type: variant, offset: 697, length: 92, content: 一切檀越施設法會，供齋調度，持齋者得食，不持齋者不得食。此飯一日持齋，得六十萬世餘糧；不持齋者，六十萬世墮餓鬼中。何以故？此信施難銷故。寧吞熱鐵丸，不食此飯。吞熱鐵丸，須臾間耳，食〔此〕－【三】此【大】，〔－〕【宋】【元】【明】此信施，久受大苦，五百萬世中受餓鬼苦。, 宮: ''}
