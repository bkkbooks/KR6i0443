  - {type: punctuation, offset: 789, content: 「, id: KR6i0443_T_001-bkkpn157}
  - {type: variant, offset: 789, length: 154, content: 「諸有設食之處，一切如法作齋，不得懷挾餘殘食，歸給妻子。若食此飯，若腋底挾擔，後五百〔世〕－【宋】【元】世【大】，〔－〕【宋】【元】世，常挾熱鐵輪，左腋底入從右腋底出。一切齋飯不可不慎，一米化作熱丸。「一切賢者施設福會，於先嘗啜此食，都作殘食，唐作此會，不如不作。何以故？諸天不歡，鬼神不喜。此人於先甞者，亦五百世中受餓鬼苦。自今已後，欲得福者，如法作齋食，可得福德，諸天歡喜，百神慶悅，天神擁護。經不虛言，福報如影響。」, 宮: ''}
